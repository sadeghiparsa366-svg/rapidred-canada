<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rapid Red — Auction Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#CC0000;--bg:#0a0a0a;--bg2:#111;--bg3:#161616;--border:#1e1e1e;--text:#ddd;--muted:#555;--g:#5a8a28;--y:#c8920e;--r:#CC0000}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* TOP BAR */
.top{background:var(--bg2);border-bottom:2px solid var(--red);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px}
.logo-text .n1{font-size:13px;font-weight:700;color:#fff;letter-spacing:.05em}
.logo-text .n1 b{color:var(--red)}
.logo-text .n2{font-size:8px;letter-spacing:.12em;color:#444;text-transform:uppercase}
.users{display:flex;gap:4px}
.u{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #222;background:transparent;color:#555}
.u.on{background:var(--red);color:#fff;border-color:var(--red)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 50px)}
.sb{width:172px;flex-shrink:0;background:var(--bg2);border-right:1px solid #181818;padding:10px 8px;overflow-y:auto}
@media(max-width:580px){.sb{display:none}}
.sbl{font-size:9px;color:#333;letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:6px;display:block;margin-top:4px}
.si{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:5px;font-size:11px;color:#4a4a4a;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left}
.si:hover{background:#161616;color:#888}
.si.on{background:#161616;color:#eee}
.nbg{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:6px}
.n-r{background:#1f0303;color:var(--red)}.n-y{background:#1a1000;color:#c8920e}.n-g{background:#071306;color:#4a7a1a}

/* CONTENT */
.main{flex:1;min-width:0;overflow-y:auto}
.bnr{padding:6px 14px;font-size:11px;border-bottom:1px solid #171717;display:flex;align-items:center;gap:5px}
.bnr.parsa{background:#180202;color:#aa3333}
.bnr.fardin{background:#07071a;color:#6666bb}
.bnr.nourbe{background:#051105;color:#3a7a3a}
.inner{padding:12px 13px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.ptitle{font-size:14px;font-weight:600;color:#ddd}
.psub{font-size:10px;color:#3a3a3a;margin-top:1px}
.fpills{display:flex;gap:3px;flex-wrap:wrap}
.fp{font-size:10px;padding:3px 9px;border-radius:16px;border:1px solid #1e1e1e;background:transparent;color:#4a4a4a}
.fp.on{background:var(--red);color:#fff;border-color:var(--red)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px}
@media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg3);border-radius:6px;padding:8px 10px}
.sl{font-size:9px;color:#3a3a3a;margin-bottom:2px}
.sv{font-size:16px;font-weight:700;color:var(--text)}

/* CARDS */
.cards{display:grid;gap:6px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.acc{height:2px}
.a-g{background:var(--g)}.a-y{background:var(--y)}.a-r{background:var(--r)}.a-b{background:#2a6aaa}

/* CARD BODY */
.cbody{display:grid;grid-template-columns:1fr 120px;min-height:90px}
@media(max-width:420px){.cbody{grid-template-columns:1fr}}
.cinfo{padding:10px 12px}
.cname{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.cmeta{font-size:10px;color:#3a3a3a;margin-bottom:6px}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.tg{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
.t-r{background:#1f0303;color:#dd3333}.t-y{background:#1a1000;color:#bb8800}.t-g{background:#071306;color:#4a8a22}.t-d{background:#181818;color:#4a4a4a}
.cimg{background:#0a0a0a;overflow:hidden}
.cimg img{width:100%;height:100%;object-fit:cover;display:block}
.cimg-ph{width:100%;height:100%;min-height:90px;display:flex;align-items:center;justify-content:center;color:#1a1a1a;font-size:28px}

/* FINANCIALS */
.fins{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid #191919;padding:7px 12px;gap:2px}
.fn{text-align:center}
.fl{font-size:8px;color:#2e2e2e}
.fv{font-size:11px;font-weight:600;margin-top:1px}
.fv.g{color:var(--g)}.fv.y{color:var(--y)}.fv.r{color:var(--r)}.fv.w{color:#bbb}

/* AI TAG */
.aitag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;margin-bottom:4px}
.ai-g{background:#071306;color:#5a8a28}.ai-y{background:#1a1000;color:#c8920e}.ai-r{background:#1f0303;color:#dd3333}.ai-d{background:#181818;color:#4a4a4a}

/* ACTIONS */
.actions{border-top:1px solid #191919;background:#0e0e0e;padding:7px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fav{width:20px;height:20px;border-radius:50%;background:#0e0e1e;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#5555aa;flex-shrink:0}
.sev-btns{display:flex;gap:3px}
.sb2{font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid #1e1e1e;background:#111;color:#4a4a4a}
.sb2.sh{background:#1f0303;color:var(--red);border-color:#661010}
.sb2.sm{background:#1a1000;color:#bb8800;border-color:#664400}
.sb2.ss{background:#071306;color:#4a8a22;border-color:#224410}
.ninp{flex:1;font-size:10px;padding:3px 7px;border:1px solid #1e1e1e;border-radius:4px;background:#111;color:#bbb;min-width:0}
.ninp::placeholder{color:#2a2a2a}
.aibtn{font-size:10px;padding:3px 8px;border:1px solid #661010;border-radius:4px;background:transparent;color:var(--red);white-space:nowrap}
.lnks{display:flex;gap:4px;padding:6px 12px;border-top:1px solid #191919}
.lb{font-size:10px;padding:2px 8px;border:1px solid #1e1e1e;border-radius:4px;background:#111;color:#3a6aaa}
.aibox{margin:6px 12px;padding:7px 9px;background:#0e0e0e;border-radius:4px;font-size:11px;color:#666;border-left:2px solid var(--red);display:none;line-height:1.6}

/* MOBILE NAV */
.mob{display:none;position:sticky;bottom:0;background:var(--bg2);border-top:1px solid #1a1a1a;padding:7px 10px;gap:4px;justify-content:center;flex-wrap:wrap}
@media(max-width:580px){.mob{display:flex}}
.mb{font-size:10px;padding:5px 11px;border-radius:16px;border:1px solid #1e1e1e;background:transparent;color:#4a4a4a}
.mb.on{background:var(--red);color:#fff;border-color:var(--red)}

.empty{text-align:center;padding:3rem 1rem;color:#1e1e1e}
.empty-icon{font-size:36px;margin-bottom:8px}
</style>
</head>
<body>

<div class="top">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 80 80" fill="none">
      <path d="M5 54C14 36 30 26 50 25C66 24 76 30 78 42" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M10 56C22 40 40 32 60 30C72 29 78 35 80 46" stroke="#CC0000" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M5 60C18 48 38 40 60 38C72 37 78 42 80 52" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="65" cy="54" r="13" stroke="#fff" stroke-width="2" fill="none"/>
      <path d="M65 42L63 46L59 46L62 49L61 53L65 51L69 53L68 49L71 46L67 46Z" fill="#CC0000"/>
    </svg>
    <div class="logo-text">
      <div class="n1">RAPID <b>RED</b></div>
      <div class="n2">Global Canada Inc.</div>
    </div>
  </div>
  <div class="users">
    <button class="u on" onclick="sU('parsa',this)">Parsa</button>
    <button class="u" onclick="sU('fardin',this)">Fardin</button>
    <button class="u" onclick="sU('nourbe',this)">Nourbe</button>
  </div>
</div>

<div class="layout">
  <div class="sb">
    <span class="sbl" style="margin-top:8px">Auction Days</span>
    <button class="si on" data-d="tue" onclick="sD('tue',this)">📅 Tue Jun 23 <span class="nbg n-r">100</span></button>
    <button class="si" data-d="wed" onclick="sD('wed',this)">📅 Wed Jun 24 <span class="nbg n-y">18</span></button>
    <button class="si" data-d="thu" onclick="sD('thu',this)">📅 Thu Jun 25 <span class="nbg n-g">7</span></button>
    <span class="sbl" style="margin-top:12px">Views</span>
    <button class="si on" id="nv-i" onclick="sV('i',this)">🚗 Inventory</button>
    <button class="si" id="nv-r" onclick="sV('r',this)">🔨 Auction Results</button>
    <button class="si" id="nv-h" onclick="sV('h',this)">📋 History</button>
    <span class="sbl" style="margin-top:12px">Filter</span>
    <button class="si" onclick="sF('BUY')">✓ BUY <span class="nbg n-g">18</span></button>
    <button class="si" onclick="sF('REVIEW')">👁 REVIEW <span class="nbg n-y">31</span></button>
    <button class="si" onclick="sF('SKIP')">✕ SKIP <span class="nbg" style="background:#181818;color:#3a3a3a">6</span></button>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="mob">
  <button class="mb on" onclick="sV('i',this)">🚗 Inventory</button>
  <button class="mb" onclick="sV('r',this)">🔨 Results</button>
  <button class="mb" onclick="sV('h',this)">📋 History</button>
  <button class="mb" onclick="sF('BUY')" style="border-color:#224410;color:#4a8a22">BUY</button>
  <button class="mb" onclick="sF('REVIEW')" style="border-color:#664400;color:#bb8800">REVIEW</button>
</div>

<script>
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';

let rU='parsa', rD='tue', rV='i', rF='all';

const CARS=[
  {id:1,lot:'53257536',yr:2026,mk:'HONDA',md:'CIVIC SI',dmg:'WATER/FLOOD',dmg2:'',fs:'Medium',ret:37525,rep:7505,dp:20,lim:35,ov:'NO',bid:24391,pft:5629,odo:4481,clr:'WHITE',keys:'YES',run:'Run and Drive',loc:'ON - LONDON',ai:'BUY',note:'',url:'https://www.copart.ca/lot/53257536',at:'https://www.autotrader.ca/cars/honda/civic/?yRng=2026,2026',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2026/6/19/d4/53257536_ful.jpg']},
  {id:2,lot:'91771015',yr:2025,mk:'KIA',md:'SELTOS EX',dmg:'FRONT END',dmg2:'UNDERCARRIAGE',fs:'Medium',ret:32441,rep:6488,dp:20,lim:35,ov:'NO',bid:21087,pft:4866,odo:4767,clr:'BLACK',keys:'YES',run:'Run and Drive',loc:'ON - TORONTO',ai:'BUY',note:'',url:'https://www.copart.ca/lot/91771015',at:'https://www.autotrader.ca/cars/kia/seltos/?yRng=2025,2025',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2025/10/7/d4/91771015_ful.jpg']},
  {id:3,lot:'79891115',yr:2025,mk:'TOYOTA',md:'CAMRY LE',dmg:'REAR END',dmg2:'MINOR DENT',fs:'High',ret:44282,rep:15499,dp:35,lim:50,ov:'NO',bid:22141,pft:6642,odo:7739,clr:'BLACK',keys:'NO',run:'Stationary',loc:'ON - COOKSTOWN',ai:'REVIEW',note:'No keys — check engine',url:'https://www.copart.ca/lot/79891115',at:'https://www.autotrader.ca/cars/toyota/camry/?yRng=2025,2025',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2025/9/19/d4/79891115_ful.jpg']},
  {id:4,lot:'51335726',yr:2020,mk:'HONDA',md:'PILOT LX',dmg:'SIDE',dmg2:'REAR END',fs:'Medium',ret:34444,rep:6889,dp:20,lim:35,ov:'NO',bid:22389,pft:5166,odo:67291,clr:'GRAY',keys:'YES',run:'Run and Drive',loc:'ON - TORONTO',ai:'BUY',note:'',url:'https://www.copart.ca/lot/51335726',at:'https://www.autotrader.ca/cars/honda/pilot/?yRng=2020,2020',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2022/5/10/d4/51335726_ful.jpg']},
  {id:5,lot:'53882246',yr:2023,mk:'TOYOTA',md:'RAV4 HYBRID XLE',dmg:'SIDE',dmg2:'VANDALISM',fs:'Medium',ret:37811,rep:7562,dp:20,lim:50,ov:'NO',bid:24577,pft:5672,odo:51148,clr:'BLACK',keys:'YES',run:'Run and Drive',loc:'ON - TORONTO',ai:'BUY',note:'',url:'https://www.copart.ca/lot/53882246',at:'https://www.autotrader.ca/cars/toyota/rav4/?yRng=2023,2023',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2023/8/9/d4/53882246_ful.jpg']},
  {id:6,lot:'47720426',yr:2024,mk:'HYUNDAI',md:'SONATA N-LINE',dmg:'FRONT END',dmg2:'MINOR DENT',fs:'High',ret:34121,rep:11942,dp:35,lim:35,ov:'NO',bid:17061,pft:5118,odo:20456,clr:'RED',keys:'YES',run:'Stationary',loc:'ON - COOKSTOWN',ai:'REVIEW',note:'Stationary',url:'https://www.copart.ca/lot/47720426',at:'https://www.autotrader.ca/cars/hyundai/sonata/?yRng=2024,2024',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2024/10/9/d4/47720426_ful.jpg']},
  {id:7,lot:'53653406',yr:2016,mk:'HYUNDAI',md:'SONATA SE',dmg:'FRONT END',dmg2:'UNDERCARRIAGE',fs:'Medium',ret:11423,rep:20729,dp:181,lim:35,ov:'YES',bid:0,pft:-9307,odo:126617,clr:'BLUE',keys:'YES',run:'Run and Drive',loc:'ON - TORONTO',ai:'SKIP',note:'',url:'https://www.copart.ca/lot/53653406',at:'https://www.autotrader.ca/cars/hyundai/sonata/?yRng=2016,2016',imgs:['https://cs.copart.com/v1/AUTH_svc.pdoc00001/LPP/2022/9/28/d4/53653406_ful.jpg']},
];
const CD={};CARS.forEach(c=>CD[c.id]=c);

function sU(u,b){rU=u;document.querySelectorAll('.u').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()}
function sD(d,b){rD=d;document.querySelectorAll('[data-d]').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()}
function sV(v,b){rV=v;['i','r','h'].forEach(x=>document.getElementById('nv-'+x)?.classList.remove('on'));document.getElementById('nv-'+v)?.classList.add('on');document.querySelectorAll('.mob .mb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render()}
function sF(f){rF=rF===f?'all':f;render()}

function aiCls(ai){return{BUY:'ai-g',REVIEW:'ai-y',SKIP:'ai-r','NEEDS DATA':'ai-d'}[ai]||'ai-d'}

function card(c){
  const ov=c.ov==='YES';
  const acc=c.ai==='BUY'?'a-g':c.ai==='REVIEW'?'a-y':c.ai==='SKIP'?'a-r':'a-b';
  const rClr=c.rep>c.ret?'r':ov?'r':c.dp>c.lim*.8?'y':'g';
  const dClr=ov?'r':c.dp>c.lim*.7?'y':'g';
  const pClr=c.pft>0?'g':'r';
  const fsClr=c.fs==='High'?'t-r':c.fs==='Small'?'t-g':'t-y';

  const imgSrc = c.imgs && c.imgs.length > 0
    ? `https://images.weserv.nl/?url=${encodeURIComponent(c.imgs[0])}&w=280&h=160&fit=cover&output=jpg`
    : '';

  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="${c.yr} ${c.mk} ${c.md}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=cimg-ph>🚗</div>'">`
    : `<div class="cimg-ph">🚗</div>`;

  const sevEdit=(rU==='parsa'||rU==='fardin')?`
    <div class="sev-btns">
      <button class="sb2 ${c.fs==='High'?'sh':''}" onclick="setSev(${c.id},'High')">High</button>
      <button class="sb2 ${c.fs==='Medium'?'sm':''}" onclick="setSev(${c.id},'Medium')">Med</button>
      <button class="sb2 ${c.fs==='Small'?'ss':''}" onclick="setSev(${c.id},'Small')">Small</button>
    </div>
    <input class="ninp" type="text" placeholder="Notes..." value="${c.note.replace(/"/g,'&quot;')}" oninput="setNote(${c.id},this.value)"/>`:
    `<span style="font-size:10px;color:#3a3a3a">${c.fs}${c.note?' — '+c.note:''}</span>`;

  const aiBtn=rU==='parsa'?`<button class="aibtn" onclick="askAI(${c.id})">✦ AI</button>`:'';

  const fins=`<div class="fins">
    <div class="fn"><div class="fl">Retail</div><div class="fv w">$${c.ret.toLocaleString()}</div></div>
    <div class="fn"><div class="fl">Repair</div><div class="fv ${rClr}">$${c.rep.toLocaleString()}</div></div>
    <div class="fn"><div class="fl">Damage</div><div class="fv ${dClr}">${c.dp}%</div></div>
    <div class="fn"><div class="fl">Max bid</div><div class="fv g">${c.bid>0?'$'+c.bid.toLocaleString():'—'}</div></div>
    <div class="fn"><div class="fl">Profit</div><div class="fv ${pClr}">$${c.pft.toLocaleString()}</div></div>
  </div>`;

  return `<div class="card" id="card-${c.id}">
    <div class="acc ${acc}"></div>
    <div class="cbody">
      <div class="cinfo">
        <div class="aitag ${aiCls(c.ai)}">${c.ai}</div>
        <div class="cname">${c.yr} ${c.mk} ${c.md}</div>
        <div class="cmeta">Lot #${c.lot} · ${c.loc} · ${c.odo.toLocaleString()} km · ${c.clr}</div>
        <div class="tags">
          <span class="tg ${fsClr}">Fardin: ${c.fs}</span>
          <span class="tg t-d">${c.dmg}${c.dmg2?' + '+c.dmg2:''}</span>
          ${c.run==='Stationary'?'<span class="tg t-y">Stationary</span>':''}
          ${c.keys==='NO'?'<span class="tg t-r">No keys</span>':''}
          ${ov?'<span class="tg t-r">Over limit</span>':''}
        </div>
      </div>
      <div class="cimg">${imgHtml}</div>
    </div>
    ${fins}
    <div class="lnks">
      <a class="lb" href="${c.url}" target="_blank">↗ CoPart</a>
      <a class="lb" href="${c.at}" target="_blank">↗ AutoTrader</a>
    </div>
    <div class="actions">
      <div class="fav">FA</div>
      ${sevEdit}
      ${aiBtn}
    </div>
    <div class="aibox" id="ai-${c.id}"></div>
  </div>`;
}

function banner(){
  const m={parsa:'👑 Parsa — full access: edit everything',fardin:'🔧 Fardin — view all, edit damage severity + notes only',nourbe:'👁 Nourbe — view only, no editing'};
  return `<div class="bnr ${rU}">${m[rU]}</div>`;
}

function render(){
  const el=document.getElementById('main');
  if(rV==='i'){
    const cars=CARS.filter(c=>rF==='all'||c.ai===rF);
    const buy=cars.filter(c=>c.ai==='BUY').length;
    const rev=cars.filter(c=>c.ai==='REVIEW').length;
    const pool=cars.filter(c=>c.bid>0).reduce((a,c)=>a+c.bid,0);
    const dl={tue:'Tue Jun 23',wed:'Wed Jun 24',thu:'Thu Jun 25'}[rD];
    el.innerHTML=`${banner()}<div class="inner">
      <div class="ph">
        <div><div class="ptitle">${dl}, 2026</div><div class="psub">Ontario Auction · ${cars.length} vehicles</div></div>
        <div class="fpills">
          <button class="fp ${rF==='all'?'on':''}" onclick="sF('all')">All</button>
          <button class="fp ${rF==='BUY'?'on':''}" onclick="sF('BUY')">BUY</button>
          <button class="fp ${rF==='REVIEW'?'on':''}" onclick="sF('REVIEW')">REVIEW</button>
          <button class="fp ${rF==='SKIP'?'on':''}" onclick="sF('SKIP')">SKIP</button>
        </div>
      </div>
      <div class="stats">
        <div class="sc"><div class="sl">Total</div><div class="sv">${cars.length}</div></div>
        <div class="sc"><div class="sl">BUY</div><div class="sv" style="color:var(--g)">${buy}</div></div>
        <div class="sc"><div class="sl">REVIEW</div><div class="sv" style="color:var(--y)">${rev}</div></div>
        <div class="sc"><div class="sl">Bid pool</div><div class="sv" style="color:var(--r)">$${Math.round(pool/1000)}K</div></div>
      </div>
      <div class="cards">${cars.map(card).join('')}</div>
    </div>`;
  } else if(rV==='r'){
    el.innerHTML=`${banner()}<div class="inner">
      <div class="ptitle" style="margin-bottom:14px">Auction Results</div>
      <div class="empty"><div class="empty-icon">🔨</div><div style="color:#333;font-size:13px">Auction not live yet</div><div style="color:#222;font-size:11px;margin-top:4px">Results will appear here during the live auction</div></div>
    </div>`;
  } else {
    const hist=[{d:'Jun 12',v:'2021 Toyota Corolla LE',bid:10200,rep:6800,sold:21500,ok:true},{d:'Jun 5',v:'2020 Honda Civic EX',bid:8800,rep:5200,sold:17400,ok:true},{d:'May 29',v:'2019 Kia Optima LX',bid:0,rep:9800,sold:0,ok:false}];
    el.innerHTML=`${banner()}<div class="inner">
      <div class="ptitle" style="margin-bottom:10px">Purchase History</div>
      <div class="stats" style="margin-bottom:10px">
        <div class="sc"><div class="sl">Won</div><div class="sv">2</div></div>
        <div class="sc"><div class="sl">Passed</div><div class="sv">1</div></div>
        <div class="sc"><div class="sl">Invested</div><div class="sv">$19K</div></div>
        <div class="sc"><div class="sl">Profit</div><div class="sv" style="color:var(--g)">$12.8K</div></div>
      </div>
      <div class="cards">${hist.map(h=>{
        const p=h.sold>0?h.sold-h.bid-h.rep:null;
        return `<div class="card">
          <div class="acc ${h.ok?'a-g':'a-r'}"></div>
          <div class="cbody"><div class="cinfo">
            <div class="aitag ${h.ok?'ai-g':'ai-d'}">${h.ok?'Won':'Passed'}</div>
            <div class="cname">${h.v}</div>
            <div class="cmeta">${h.d} 2026</div>
          </div><div class="cimg"><div class="cimg-ph">🚗</div></div></div>
          `<div class="fins">
            <div class="fn"><div class="fl">Final bid</div><div class="fv w">${h.bid?'$'+h.bid.toLocaleString():'—'}</div></div>
            <div class="fn"><div class="fl">Repair</div><div class="fv y">$${h.rep.toLocaleString()}</div></div>
            <div class="fn"><div class="fl">Sold for</div><div class="fv w">${h.sold?'$'+h.sold.toLocaleString():'—'}</div></div>
            <div class="fn"><div class="fl">Profit</div><div class="fv ${p===null?'w':p>=0?'g':'r'}">${p!==null?'$'+p.toLocaleString():'—'}</div></div>
            <div class="fn"><div class="fl">Status</div><div class="fv ${h.ok?'g':'w'}">${h.ok?'✓':'—'}</div></div>
          </div>`
        </div>`;
      }).join('')}
    </div></div>`;
  }
}

function setSev(id,sev){
  const c=CD[id];c.fs=sev;
  const p=sev==='High'?.35:sev==='Small'?.10:.20;
  c.rep=Math.round(c.ret*p);
  c.dp=Math.round(c.rep/c.ret*1000)/10;
  c.ov=c.dp>c.lim?'YES':'NO';
  c.bid=c.ret>0?Math.max(0,Math.round(c.ret-c.rep-c.ret*.15)):0;
  c.pft=c.ret-c.rep-c.bid;
  render();
}
function setNote(id,v){CD[id].note=v}

async function askAI(id){
  const c=CD[id];
  const el=document.getElementById('ai-'+id);
  el.style.display='block';el.textContent='Analyzing...';
  const prompt=`You are an expert buying salvage cars at CoPart Canada for Rapid Red garage in Toronto. Analyze this vehicle: ${c.yr} ${c.mk} ${c.md} (Lot ${c.lot}). Primary damage: ${c.dmg}${c.dmg2?' + '+c.dmg2:''}. Fardin (mechanic) severity: ${c.fs}. Retail value: $${c.ret.toLocaleString()} CAD. Estimated repair: $${c.rep.toLocaleString()} CAD. Damage: ${c.dp}% (limit is ${c.lim}%). Max bid: $${c.bid.toLocaleString()} CAD. Profit target: $${c.pft.toLocaleString()} CAD. Odometer: ${c.odo.toLocaleString()} km. Condition: ${c.run}. Keys: ${c.keys}.${c.note?' Fardin note: '+c.note:''} In exactly 3 sentences: (1) BUY / REVIEW / SKIP recommendation and why. (2) Key risk or concern. (3) What Fardin must physically check.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    el.textContent=d.content?.map(i=>i.text||'').join('')||JSON.stringify(d);
  }catch(e){el.textContent='Error: '+e.message;}
}

render();
</script>
